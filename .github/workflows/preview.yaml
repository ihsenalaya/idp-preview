name: Preview Environment

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE: ghcr.io/${{ github.repository }}:${{ github.sha }}
  CONTROLLER_GITHUB_TOKEN_SECRET: preview-github-token
  KANIKO_SECRET: ghcr-secret-${{ github.run_id }}
  KANIKO_JOB: kaniko-${{ github.run_id }}

jobs:
  deploy:
    name: Build & Deploy Preview
    runs-on: [self-hosted, aks, test1]
    permissions:
      contents: read
      packages: write
      deployments: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl
        run: |
          if ! command -v kubectl >/dev/null 2>&1; then
            curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            chmod +x kubectl
            mkdir -p "$HOME/.local/bin"
            mv kubectl "$HOME/.local/bin/"
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi

      - name: Create GHCR auth secret
        run: |
          if [ -z '${{ secrets.PREVIEW_GITHUB_TOKEN }}' ]; then
            echo "PREVIEW_GITHUB_TOKEN secret is required to push to GHCR" >&2
            exit 1
          fi
          kubectl create secret docker-registry "$KANIKO_SECRET" \
            --docker-server=ghcr.io \
            --docker-username='${{ github.actor }}' \
            --docker-password='${{ secrets.PREVIEW_GITHUB_TOKEN }}' \
            --namespace=github-runner \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Build and push image with Kaniko
        run: |
          cat <<EOF | kubectl apply -f -
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: ${KANIKO_JOB}
            namespace: github-runner
          spec:
            ttlSecondsAfterFinished: 120
            template:
              spec:
                restartPolicy: Never
                containers:
                  - name: kaniko
                    image: gcr.io/kaniko-project/executor:latest
                    args:
                      - --context=git://github.com/${{ github.repository }}
                      - --git=branch=${{ github.head_ref }}
                      - --destination=${IMAGE}
                      - --snapshot-mode=redo
                      - --compressed-caching=false
                    env:
                      - name: GIT_USERNAME
                        value: x-access-token
                      - name: GIT_PASSWORD
                        value: '${{ secrets.GITHUB_TOKEN }}'
                    volumeMounts:
                      - name: kaniko-secret
                        mountPath: /kaniko/.docker
                volumes:
                  - name: kaniko-secret
                    secret:
                      secretName: ${KANIKO_SECRET}
                      items:
                        - key: .dockerconfigjson
                          path: config.json
          EOF

          kubectl wait "job/${KANIKO_JOB}" \
            --for=condition=complete \
            --namespace=github-runner \
            --timeout=300s

      - name: Create GitHub Deployment
        id: deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.pull_request.head.sha,
              environment: `pr-${{ github.event.pull_request.number }}`,
              auto_merge: false,
              required_contexts: [],
              description: "Preview environment"
            });
            return deployment.data.id;

      - name: Create controller GitHub token secret
        run: |
          if [ -z '${{ secrets.PREVIEW_GITHUB_TOKEN }}' ]; then
            echo "PREVIEW_GITHUB_TOKEN GitHub Actions secret is required" >&2
            exit 1
          fi

          kubectl create secret generic "$CONTROLLER_GITHUB_TOKEN_SECRET" \
            --namespace=preview-operator-system \
            --from-literal=token='${{ secrets.PREVIEW_GITHUB_TOKEN }}' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Compute change context from PR diff
        id: ctx
        run: |
          python3 << 'PYEOF'
          import json, os, re, urllib.request

          pr_num  = '${{ github.event.pull_request.number }}'
          repo    = '${{ github.repository }}'
          token   = os.environ.get('GH_TOKEN', '')

          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/pulls/{pr_num}/files?per_page=100",
              headers={"Authorization": f"token {token}",
                       "Accept": "application/vnd.github.v3+json"}
          )
          with urllib.request.urlopen(req, timeout=15) as r:
              files = json.loads(r.read())

          def classify(path):
              if re.search(r'migrations/versions/', path): return 'migration'
              if re.search(r'api/openapi\.yaml',   path): return 'contract'
              if re.search(r'frontend\.py|templates/|static/', path): return 'frontend'
              if re.search(r'app\.py|tests/',       path): return 'backend'
              return 'config'

          changed = [{"path": f["filename"], "type": classify(f["filename"])} for f in files]

          database    = any(c["type"] == "migration" for c in changed)
          apiContract = any(c["type"] == "contract"  for c in changed)
          frontend    = any(c["type"] == "frontend"  for c in changed)
          backend     = any(c["type"] == "backend"   for c in changed)

          # YAML lines for changedFiles — indented to match the manifest heredoc
          yaml_lines = []
          for c in changed:
              yaml_lines.append(f"              - path: {c['path']}")
              yaml_lines.append(f"                type: {c['type']}")

          out = os.environ.get('GITHUB_OUTPUT', '/dev/stdout')
          with open(out, 'a') as fh:
              fh.write(f"DATABASE={'true' if database else 'false'}\n")
              fh.write(f"APICONTRACT={'true' if apiContract else 'false'}\n")
              fh.write(f"FRONTEND={'true' if frontend else 'false'}\n")
              fh.write(f"BACKEND={'true' if backend else 'false'}\n")
              fh.write(f"COUNT={len(changed)}\n")
              fh.write("CHANGED_FILES<<__EOF__\n")
              fh.write("\n".join(yaml_lines) + "\n")
              fh.write("__EOF__\n")

          print(f"[ctx] {len(changed)} files — db={database} api={apiContract} frontend={frontend} backend={backend}")
          PYEOF
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply Preview manifest
        run: |
          kubectl apply -f - <<EOF
          apiVersion: platform.company.io/v1alpha1
          kind: Preview
          metadata:
            name: pr-${{ github.event.pull_request.number }}
          spec:
            branch: ${{ github.head_ref }}
            prNumber: ${{ github.event.pull_request.number }}
            image: ${IMAGE}
            resourceTier: medium
            ttl: 48h
            testStrategy:
              mode: Auto
              confidenceThreshold: 65
            changeContext:
              diffRef:
                headSHA: ${{ github.event.pull_request.head.sha }}
                baseSHA: ${{ github.event.pull_request.base.sha }}
              summary:
                changedFilesCount: ${{ steps.ctx.outputs.COUNT }}
              detectedImpacts:
                database: ${{ steps.ctx.outputs.DATABASE }}
                apiContract: ${{ steps.ctx.outputs.APICONTRACT }}
                frontend: ${{ steps.ctx.outputs.FRONTEND }}
                backend: ${{ steps.ctx.outputs.BACKEND }}
              changedFiles:
${{ steps.ctx.outputs.CHANGED_FILES }}
            services:
              - name: backend
                image: ${IMAGE}
                port: 8080
                pathPrefix: /api
              - name: frontend
                image: ${IMAGE}
                port: 3000
                pathPrefix: /
                env:
                  - name: APP_MODE
                    value: frontend
                  - name: PREVIEW_PR
                    value: "${{ github.event.pull_request.number }}"
                  - name: PREVIEW_BRANCH
                    value: ${{ github.head_ref }}
            database:
              enabled: true
              databaseName: appdb
            telemetry:
              enabled: true
              serviceName: idp-testing
              autoInstrumentation:
                language: python
                instrumentationRef: observability/python
            testSuite:
              enabled: true
              smoke: {}
              migration:
                enabled: true
              contractTesting:
                enabled: true
                microcksURL: http://microcks.microcks.svc.cluster.local:8080
                apiName: Preview Catalog API
                apiVersion: "1.0.0"
                specURL: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.head_ref }}/api/openapi.yaml
              regression:
                enabled: true
              e2e:
                enabled: true
            aiEnrichment:
              enabled: true
              apiSecretRef:
                name: ai-api-key
                key: api-key
              model: gpt-4o-mini
            kagent:
              enabled: true
              namespace: kagent-system
              agentName: preview-troubleshooter-agent
              testStrategistAgentName: test-strategist-agent
            github:
              enabled: true
              owner: ${{ github.repository_owner }}
              repo: ${{ github.event.repository.name }}
              deploymentId: ${{ steps.deployment.outputs.result }}
              environment: pr-${{ github.event.pull_request.number }}
              commentOnReady: true
              tokenSecretRef:
                name: ${CONTROLLER_GITHUB_TOKEN_SECRET}
                namespace: preview-operator-system
                key: token
          EOF

      - name: Wait for Preview to be ready
        run: |
          for i in $(seq 1 30); do
            PHASE=$(kubectl get preview pr-${{ github.event.pull_request.number }} \
              -o jsonpath='{.status.phase}' 2>/dev/null || echo "")
            URL=$(kubectl get preview pr-${{ github.event.pull_request.number }} \
              -o jsonpath='{.status.url}' 2>/dev/null || echo "")
            GITHUB_STATE=$(kubectl get preview pr-${{ github.event.pull_request.number }} \
              -o jsonpath='{.status.github.deploymentState}' 2>/dev/null || echo "")
            echo "Phase: ${PHASE} URL: ${URL} GitHub: ${GITHUB_STATE}"
            if [ "$PHASE" = "Running" ] && [ "$GITHUB_STATE" = "success" ]; then
              echo "Preview ready: ${URL}"
              exit 0
            fi
            if [ "$PHASE" = "Failed" ]; then
              kubectl describe preview pr-${{ github.event.pull_request.number }}
              exit 1
            fi
            sleep 10
          done

          kubectl describe preview pr-${{ github.event.pull_request.number }} || true
          exit 1

      - name: Cleanup Kaniko secret
        if: always()
        run: |
          kubectl delete secret "$KANIKO_SECRET" \
            --namespace=github-runner --ignore-not-found
