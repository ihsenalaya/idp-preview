name: Preview Environment

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE: ghcr.io/${{ github.repository }}:${{ github.sha }}
  CONTROLLER_GITHUB_TOKEN_SECRET: cellenza-github-token
  KANIKO_SECRET: ghcr-secret-${{ github.run_id }}
  KANIKO_JOB: kaniko-${{ github.run_id }}

jobs:
  deploy:
    name: Build & Deploy Preview
    runs-on: [self-hosted, kind]
    permissions:
      contents: read
      packages: write
      deployments: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl
        run: |
          if ! command -v kubectl >/dev/null 2>&1; then
            curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            chmod +x kubectl
            mkdir -p "$HOME/.local/bin"
            mv kubectl "$HOME/.local/bin/"
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi

      - name: Create GHCR auth secret
        run: |
          if [ -z '${{ secrets.CELLENZA_GITHUB_TOKEN }}' ]; then
            echo "CELLENZA_GITHUB_TOKEN secret is required to push to GHCR" >&2
            exit 1
          fi
          kubectl create secret docker-registry "$KANIKO_SECRET" \
            --docker-server=ghcr.io \
            --docker-username='${{ github.actor }}' \
            --docker-password='${{ secrets.CELLENZA_GITHUB_TOKEN }}' \
            --namespace=github-runner \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Build and push image with Kaniko
        run: |
          cat <<EOF | kubectl apply -f -
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: ${KANIKO_JOB}
            namespace: github-runner
          spec:
            ttlSecondsAfterFinished: 120
            template:
              spec:
                restartPolicy: Never
                containers:
                  - name: kaniko
                    image: gcr.io/kaniko-project/executor:latest
                    args:
                      - --context=git://github.com/${{ github.repository }}
                      - --git=branch=${{ github.head_ref }}
                      - --destination=${IMAGE}
                      - --snapshot-mode=redo
                      - --compressed-caching=false
                    env:
                      - name: GIT_USERNAME
                        value: x-access-token
                      - name: GIT_PASSWORD
                        value: '${{ secrets.GITHUB_TOKEN }}'
                    volumeMounts:
                      - name: kaniko-secret
                        mountPath: /kaniko/.docker
                volumes:
                  - name: kaniko-secret
                    secret:
                      secretName: ${KANIKO_SECRET}
                      items:
                        - key: .dockerconfigjson
                          path: config.json
          EOF

          kubectl wait "job/${KANIKO_JOB}" \
            --for=condition=complete \
            --namespace=github-runner \
            --timeout=300s

      - name: Create GitHub Deployment
        id: deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.pull_request.head.sha,
              environment: `pr-${{ github.event.pull_request.number }}`,
              auto_merge: false,
              required_contexts: [],
              description: "Cellenza preview environment"
            });
            return deployment.data.id;

      - name: Create controller GitHub token secret
        run: |
          if [ -z '${{ secrets.CELLENZA_GITHUB_TOKEN }}' ]; then
            echo "CELLENZA_GITHUB_TOKEN GitHub Actions secret is required" >&2
            exit 1
          fi

          kubectl create secret generic "$CONTROLLER_GITHUB_TOKEN_SECRET" \
            --namespace=cellenza-operator-system \
            --from-literal=token='${{ secrets.CELLENZA_GITHUB_TOKEN }}' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply Cellenza manifest
        run: |
          kubectl apply -f - <<EOF
          apiVersion: platform.company.io/v1alpha1
          kind: Cellenza
          metadata:
            name: pr-${{ github.event.pull_request.number }}
          spec:
            branch: ${{ github.head_ref }}
            prNumber: ${{ github.event.pull_request.number }}
            image: ${IMAGE}
            resourceTier: medium
            ttl: 48h
            database:
              enabled: true
              databaseName: appdb
            telemetry:
              enabled: true
              serviceName: idp-testing
              autoInstrumentation:
                language: python
                instrumentationRef: observability/python
            github:
              enabled: true
              owner: ${{ github.repository_owner }}
              repo: ${{ github.event.repository.name }}
              deploymentId: ${{ steps.deployment.outputs.result }}
              environment: pr-${{ github.event.pull_request.number }}
              commentOnReady: true
              tokenSecretRef:
                name: ${CONTROLLER_GITHUB_TOKEN_SECRET}
                namespace: cellenza-operator-system
                key: token
          EOF

      - name: Wait for Cellenza to be ready
        run: |
          for i in $(seq 1 30); do
            PHASE=$(kubectl get cellenza pr-${{ github.event.pull_request.number }} \
              -o jsonpath='{.status.phase}' 2>/dev/null || echo "")
            URL=$(kubectl get cellenza pr-${{ github.event.pull_request.number }} \
              -o jsonpath='{.status.url}' 2>/dev/null || echo "")
            GITHUB_STATE=$(kubectl get cellenza pr-${{ github.event.pull_request.number }} \
              -o jsonpath='{.status.github.deploymentState}' 2>/dev/null || echo "")
            echo "Phase: ${PHASE} URL: ${URL} GitHub: ${GITHUB_STATE}"
            if [ "$PHASE" = "Running" ] && [ "$GITHUB_STATE" = "success" ]; then
              echo "Preview ready: ${URL}"
              exit 0
            fi
            if [ "$PHASE" = "Failed" ]; then
              kubectl describe cellenza pr-${{ github.event.pull_request.number }}
              exit 1
            fi
            sleep 10
          done

          kubectl describe cellenza pr-${{ github.event.pull_request.number }} || true
          exit 1

      - name: Run tests
        run: |
          APP_URL="http://app.preview-pr-${{ github.event.pull_request.number }}.svc.cluster.local:80"
          pip install requests --quiet

          echo "=== Unit tests ==="
          python tests/test_app.py

          echo "=== Integration tests ==="
          APP_URL="${APP_URL}" python tests/example_test.py

      - name: Cleanup Kaniko secret
        if: always()
        run: |
          kubectl delete secret "$KANIKO_SECRET" \
            --namespace=github-runner --ignore-not-found
