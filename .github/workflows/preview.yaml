name: Preview Environment

# Triggered by:
#  - pull_request: standard flow (PR number from event)
#  - push to demo1: branch testing (synthetic PR number from run_number)
#  - workflow_dispatch: manual run on any branch
on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: ["demo*", "demo-*"]
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to deploy as a preview
        required: false
        default: demo1
      pr_number:
        description: Synthetic PR number (used in preview name and namespace)
        required: false
        default: "9999"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE: ghcr.io/${{ github.repository }}:${{ github.sha }}
  CONTROLLER_GITHUB_TOKEN_SECRET: preview-github-token
  KANIKO_SECRET: ghcr-secret-${{ github.run_id }}
  KANIKO_JOB: kaniko-${{ github.run_id }}

jobs:
  deploy:
    name: Build & Deploy Preview
    runs-on: [self-hosted, aks, test1]
    permissions:
      contents: read
      packages: write
      deployments: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve preview context (PR / push / manual)
        id: ctx
        run: |
          set -euo pipefail
          case "${{ github.event_name }}" in
            pull_request)
              echo "pr_number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
              echo "branch=${{ github.head_ref }}" >> "$GITHUB_OUTPUT"
              echo "base_sha=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
              echo "head_sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
              ;;
            push)
              # push to demo1 — synthesize PR number from run_number for uniqueness
              echo "pr_number=${{ github.run_number }}" >> "$GITHUB_OUTPUT"
              echo "branch=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
              BASE=$(git rev-parse origin/main 2>/dev/null || git rev-parse HEAD~1)
              echo "base_sha=$BASE" >> "$GITHUB_OUTPUT"
              echo "head_sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
              ;;
            workflow_dispatch)
              echo "pr_number=${{ github.event.inputs.pr_number }}" >> "$GITHUB_OUTPUT"
              echo "branch=${{ github.event.inputs.branch }}" >> "$GITHUB_OUTPUT"
              BASE=$(git rev-parse origin/main 2>/dev/null || git rev-parse HEAD~1)
              echo "base_sha=$BASE" >> "$GITHUB_OUTPUT"
              echo "head_sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Install kubectl
        run: |
          if ! command -v kubectl >/dev/null 2>&1; then
            curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            chmod +x kubectl
            mkdir -p "$HOME/.local/bin"
            mv kubectl "$HOME/.local/bin/"
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi

      - name: Create GHCR auth secret
        run: |
          if [ -z '${{ secrets.PREVIEW_GITHUB_TOKEN }}' ]; then
            echo "PREVIEW_GITHUB_TOKEN secret is required to push to GHCR" >&2
            exit 1
          fi
          kubectl create secret docker-registry "$KANIKO_SECRET" \
            --docker-server=ghcr.io \
            --docker-username='${{ github.actor }}' \
            --docker-password='${{ secrets.PREVIEW_GITHUB_TOKEN }}' \
            --namespace=github-runner \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Build and push image with Kaniko
        run: |
          cat <<EOF | kubectl apply -f -
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: ${KANIKO_JOB}
            namespace: github-runner
          spec:
            ttlSecondsAfterFinished: 120
            template:
              spec:
                restartPolicy: Never
                containers:
                  - name: kaniko
                    image: gcr.io/kaniko-project/executor:latest
                    args:
                      - --context=git://github.com/${{ github.repository }}
                      - --git=branch=${{ steps.ctx.outputs.branch }}
                      - --destination=${IMAGE}
                      - --snapshot-mode=redo
                      - --compressed-caching=false
                    env:
                      - name: GIT_USERNAME
                        value: x-access-token
                      - name: GIT_PASSWORD
                        value: '${{ secrets.GITHUB_TOKEN }}'
                    volumeMounts:
                      - name: kaniko-secret
                        mountPath: /kaniko/.docker
                volumes:
                  - name: kaniko-secret
                    secret:
                      secretName: ${KANIKO_SECRET}
                      items:
                        - key: .dockerconfigjson
                          path: config.json
          EOF

          kubectl wait "job/${KANIKO_JOB}" \
            --for=condition=complete \
            --namespace=github-runner \
            --timeout=300s

      - name: Create GitHub Deployment
        id: deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: "${{ steps.ctx.outputs.head_sha }}",
              environment: `pr-${{ steps.ctx.outputs.pr_number }}`,
              auto_merge: false,
              required_contexts: [],
              description: "Preview environment"
            });
            return deployment.data.id;

      - name: Create controller GitHub token secret
        run: |
          if [ -z '${{ secrets.PREVIEW_GITHUB_TOKEN }}' ]; then
            echo "PREVIEW_GITHUB_TOKEN GitHub Actions secret is required" >&2
            exit 1
          fi

          kubectl create secret generic "$CONTROLLER_GITHUB_TOKEN_SECRET" \
            --namespace=preview-operator-system \
            --from-literal=token='${{ secrets.PREVIEW_GITHUB_TOKEN }}' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply Preview manifest
        run: |
          git fetch --unshallow 2>/dev/null || true
          git fetch origin main --depth=1 2>/dev/null || true

          python3 scripts/generate_preview_manifest.py \
            --pr-number "${{ steps.ctx.outputs.pr_number }}" \
            --branch "${{ steps.ctx.outputs.branch }}" \
            --image "${IMAGE}" \
            --base-sha "${{ steps.ctx.outputs.base_sha }}" \
            --head-sha "${{ steps.ctx.outputs.head_sha }}" \
            --repo "${{ github.repository }}" \
            --repo-owner "${{ github.repository_owner }}" \
            --repo-name "${{ github.event.repository.name }}" \
            --deployment-id "${{ steps.deployment.outputs.result }}" \
            --github-token-secret "${CONTROLLER_GITHUB_TOKEN_SECRET}" \
            --agent-timeout-seconds 120 \
          | tee /dev/stderr | kubectl apply -f -

      - name: Wait for Preview to be ready
        run: |
          PREV="pr-${{ steps.ctx.outputs.pr_number }}"
          for i in $(seq 1 30); do
            PHASE=$(kubectl get preview "$PREV" -o jsonpath='{.status.phase}' 2>/dev/null || echo "")
            URL=$(kubectl get preview "$PREV" -o jsonpath='{.status.url}' 2>/dev/null || echo "")
            GITHUB_STATE=$(kubectl get preview "$PREV" -o jsonpath='{.status.github.deploymentState}' 2>/dev/null || echo "")
            echo "Phase: ${PHASE} URL: ${URL} GitHub: ${GITHUB_STATE}"
            if [ "$PHASE" = "Running" ] && [ "$GITHUB_STATE" = "success" ]; then
              echo "Preview ready: ${URL}"
              exit 0
            fi
            if [ "$PHASE" = "Failed" ]; then
              kubectl describe preview "$PREV"
              exit 1
            fi
            sleep 10
          done

          kubectl describe preview "$PREV" || true
          exit 1

      - name: Cleanup Kaniko secret
        if: always()
        run: |
          kubectl delete secret "$KANIKO_SECRET" \
            --namespace=github-runner --ignore-not-found
