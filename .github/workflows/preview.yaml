name: Preview Environment

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE: ghcr.io/${{ github.repository }}:${{ github.sha }}
  CONTROLLER_GITHUB_TOKEN_SECRET: preview-github-token
  KANIKO_SECRET: ghcr-secret-${{ github.run_id }}
  KANIKO_JOB: kaniko-${{ github.run_id }}

jobs:
  deploy:
    name: Build & Deploy Preview
    runs-on: [self-hosted, aks]
    permissions:
      contents: read
      packages: write
      deployments: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl
        run: |
          if ! command -v kubectl >/dev/null 2>&1; then
            curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            chmod +x kubectl
            mkdir -p "$HOME/.local/bin"
            mv kubectl "$HOME/.local/bin/"
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi

      - name: Create GHCR auth secret
        run: |
          if [ -z '${{ secrets.PREVIEW_GITHUB_TOKEN }}' ]; then
            echo "PREVIEW_GITHUB_TOKEN secret is required to push to GHCR" >&2
            exit 1
          fi
          kubectl create secret docker-registry "$KANIKO_SECRET" \
            --docker-server=ghcr.io \
            --docker-username='${{ github.actor }}' \
            --docker-password='${{ secrets.PREVIEW_GITHUB_TOKEN }}' \
            --namespace=github-runner \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Build and push image with Kaniko
        run: |
          cat <<EOF | kubectl apply -f -
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: ${KANIKO_JOB}
            namespace: github-runner
          spec:
            ttlSecondsAfterFinished: 120
            template:
              spec:
                restartPolicy: Never
                containers:
                  - name: kaniko
                    image: gcr.io/kaniko-project/executor:latest
                    args:
                      - --context=git://github.com/${{ github.repository }}
                      - --git=branch=${{ github.head_ref }}
                      - --destination=${IMAGE}
                      - --snapshot-mode=redo
                      - --compressed-caching=false
                    env:
                      - name: GIT_USERNAME
                        value: x-access-token
                      - name: GIT_PASSWORD
                        value: '${{ secrets.GITHUB_TOKEN }}'
                    volumeMounts:
                      - name: kaniko-secret
                        mountPath: /kaniko/.docker
                volumes:
                  - name: kaniko-secret
                    secret:
                      secretName: ${KANIKO_SECRET}
                      items:
                        - key: .dockerconfigjson
                          path: config.json
          EOF

          kubectl wait "job/${KANIKO_JOB}" \
            --for=condition=complete \
            --namespace=github-runner \
            --timeout=300s

      - name: Create GitHub Deployment
        id: deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.pull_request.head.sha,
              environment: `pr-${{ github.event.pull_request.number }}`,
              auto_merge: false,
              required_contexts: [],
              description: "Preview environment"
            });
            return deployment.data.id;

      - name: Classify PR diff (changeContext)
        id: classify
        run: |
          python3 - <<'PYEOF'
          import json, os, subprocess, sys

          repo = os.environ.get("GITHUB_REPOSITORY", "")
          pr   = os.environ.get("PR_NUMBER", "")
          token = os.environ.get("GH_TOKEN", "")

          def gh(path):
              cmd = ["gh", "api", path, "--paginate"]
              r = subprocess.run(cmd, capture_output=True, text=True)
              if r.returncode != 0:
                  print("gh api error:", r.stderr, file=sys.stderr)
                  return []
              return json.loads(r.stdout)

          def classify(path):
              p = path.lower()
              ext = p.rsplit(".", 1)[-1] if "." in p else ""
              if p.startswith(("db/migrations/", "migrations/")) or ext == "sql":
                  return "database-migration"
              if p in ("api/openapi.yaml", "api/openapi.yml") or (p.startswith("api/") and ext == "proto"):
                  return "api-contract"
              if (p.startswith("src/") or ext in ("py", "go")) and ext in ("ts", "py", "go"):
                  return "backend"
              if p.startswith(("web/", "frontend/")) or ext in ("tsx", "css"):
                  return "frontend"
              if ext == "md" or p.startswith("docs/"):
                  return "docs"
              return "other"

          files_raw = gh(f"repos/{repo}/pulls/{pr}/files")
          files = [{"path": f["filename"], "type": classify(f["filename"])} for f in files_raw]
          impacts = {}
          for f in files:
              t = f["type"]
              if t == "database-migration":
                  impacts["database"] = True
                  impacts["requiresSeedData"] = True
              elif t == "api-contract":
                  impacts["apiContract"] = True
                  impacts["requiresContractTests"] = True
              elif t == "backend":
                  impacts["backend"] = True
                  impacts["requiresRegressionTests"] = True
              elif t == "frontend":
                  impacts["frontend"] = True

          ctx = {"changedFiles": files, "detectedImpacts": impacts}
          print("=== changeContext ===")
          print(json.dumps(ctx, indent=2))
          # Export as compact JSON for downstream steps
          compact = json.dumps(ctx)
          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"change_context={compact}\n")
          print("=== impacts summary ===")
          for k, v in impacts.items():
              print(f"  {k}: {v}")
          PYEOF
        env:
          GH_TOKEN: ${{ secrets.PREVIEW_GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}

      - name: Comment changeContext on PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PREVIEW_GITHUB_TOKEN }}
          script: |
            const ctx = JSON.parse(process.env.CHANGE_CONTEXT);
            const impacts = ctx.detectedImpacts;

            const badge = (v) => v ? '✅' : '⬜';
            const rows = ctx.changedFiles.map(f =>
              `| \`${f.path}\` | \`${f.type}\` |`
            ).join('\n');

            const body = [
              '## 🔍 Change Context',
              '',
              '| File | Type |',
              '|------|------|',
              rows,
              '',
              '### Detected Impacts',
              `| Impact | Detected |`,
              `|--------|----------|`,
              `| Database migration | ${badge(impacts.database)} |`,
              `| API contract change | ${badge(impacts.apiContract)} |`,
              `| Backend change | ${badge(impacts.backend)} |`,
              `| Frontend change | ${badge(impacts.frontend)} |`,
              '',
              impacts.requiresContractTests  ? '> ⚠️ Contract tests will run (API spec changed)' : '',
              impacts.requiresRegressionTests ? '> ⚠️ Regression tests will run (backend changed)' : '',
              impacts.requiresSeedData        ? '> ⚠️ Seed data required (DB migration detected)' : '',
            ].filter(l => l !== undefined).join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' && c.body.startsWith('## 🔍 Change Context')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }
        env:
          CHANGE_CONTEXT: ${{ steps.classify.outputs.change_context }}

      - name: Create controller GitHub token secret
        run: |
          if [ -z '${{ secrets.PREVIEW_GITHUB_TOKEN }}' ]; then
            echo "PREVIEW_GITHUB_TOKEN GitHub Actions secret is required" >&2
            exit 1
          fi

          kubectl create secret generic "$CONTROLLER_GITHUB_TOKEN_SECRET" \
            --namespace=preview-operator-system \
            --from-literal=token='${{ secrets.PREVIEW_GITHUB_TOKEN }}' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply Preview manifest
        run: |
          kubectl apply -f - <<EOF
          apiVersion: platform.company.io/v1alpha1
          kind: Preview
          metadata:
            name: pr-${{ github.event.pull_request.number }}
          spec:
            branch: ${{ github.head_ref }}
            prNumber: ${{ github.event.pull_request.number }}
            image: ${IMAGE}
            resourceTier: medium
            ttl: 48h
            services:
              - name: backend
                image: ${IMAGE}
                port: 8080
                pathPrefix: /api
              - name: frontend
                image: ${IMAGE}
                port: 3000
                pathPrefix: /
                env:
                  - name: APP_MODE
                    value: frontend
                  - name: PREVIEW_PR
                    value: "${{ github.event.pull_request.number }}"
                  - name: PREVIEW_BRANCH
                    value: ${{ github.head_ref }}
            database:
              enabled: true
              databaseName: appdb
              migration:
                enabled: true
                image: ${IMAGE}
                command: ["alembic", "upgrade", "head"]
            telemetry:
              enabled: true
              serviceName: idp-testing
              autoInstrumentation:
                language: python
                instrumentationRef: observability/python
            testSuite:
              enabled: true
              smoke: {}
              contractTesting:
                enabled: true
                microcksURL: http://microcks.microcks.svc.cluster.local:8080
                apiName: Preview Catalog API
                apiVersion: "1.0.0"
                specURL: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.head_ref }}/api/openapi.yaml
              regression:
                enabled: true
              e2e:
                enabled: true
            aiEnrichment:
              enabled: true
              apiSecretRef:
                name: ai-api-key
                key: api-key
              model: gpt-4o-mini
            kagent:
              enabled: true
              namespace: kagent-system
              agentName: preview-troubleshooter-agent
            github:
              enabled: true
              owner: ${{ github.repository_owner }}
              repo: ${{ github.event.repository.name }}
              deploymentId: ${{ steps.deployment.outputs.result }}
              environment: pr-${{ github.event.pull_request.number }}
              commentOnReady: true
              tokenSecretRef:
                name: ${CONTROLLER_GITHUB_TOKEN_SECRET}
                namespace: preview-operator-system
                key: token
          EOF

      - name: Wait for Preview to be ready
        run: |
          for i in $(seq 1 30); do
            PHASE=$(kubectl get preview pr-${{ github.event.pull_request.number }} \
              -o jsonpath='{.status.phase}' 2>/dev/null || echo "")
            URL=$(kubectl get preview pr-${{ github.event.pull_request.number }} \
              -o jsonpath='{.status.url}' 2>/dev/null || echo "")
            GITHUB_STATE=$(kubectl get preview pr-${{ github.event.pull_request.number }} \
              -o jsonpath='{.status.github.deploymentState}' 2>/dev/null || echo "")
            echo "Phase: ${PHASE} URL: ${URL} GitHub: ${GITHUB_STATE}"
            if [ "$PHASE" = "Running" ] && [ "$GITHUB_STATE" = "success" ]; then
              echo "Preview ready: ${URL}"
              exit 0
            fi
            if [ "$PHASE" = "Failed" ]; then
              kubectl describe preview pr-${{ github.event.pull_request.number }}
              exit 1
            fi
            sleep 10
          done

          kubectl describe preview pr-${{ github.event.pull_request.number }} || true
          exit 1

      - name: Cleanup Kaniko secret
        if: always()
        run: |
          kubectl delete secret "$KANIKO_SECRET" \
            --namespace=github-runner --ignore-not-found
