name: Preview Environment

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    name: Build & Deploy Preview
    runs-on: [self-hosted, kind]
    permissions:
      contents: read
      packages: write
      deployments: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push image
        run: |
          docker build -t ghcr.io/${{ github.repository }}:${{ github.sha }} .
          docker push ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Create GitHub Deployment
        id: deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.pull_request.head.sha,
              environment: `pr-${{ github.event.pull_request.number }}`,
              auto_merge: false,
              required_contexts: [],
              description: "Cellenza preview environment"
            });
            return deployment.data.id;

      - name: Apply Cellenza manifest
        run: |
          kubectl apply -f - <<EOF
          apiVersion: platform.company.io/v1alpha1
          kind: Cellenza
          metadata:
            name: pr-${{ github.event.pull_request.number }}
          spec:
            branch: ${{ github.head_ref }}
            prNumber: ${{ github.event.pull_request.number }}
            image: ghcr.io/${{ github.repository }}:${{ github.sha }}
            resourceTier: medium
            ttl: 48h
          EOF

      - name: Wait for Running phase
        id: wait
        run: |
          for i in $(seq 1 30); do
            PHASE=$(kubectl get cellenza pr-${{ github.event.pull_request.number }} \
              -o jsonpath='{.status.phase}' 2>/dev/null || echo "")
            URL=$(kubectl get cellenza pr-${{ github.event.pull_request.number }} \
              -o jsonpath='{.status.url}' 2>/dev/null || echo "")
            echo "Phase: $PHASE — URL: $URL"
            if [ "$PHASE" = "Running" ]; then
              echo "url=$URL" >> $GITHUB_OUTPUT
              break
            fi
            sleep 10
          done

      - name: Update GitHub Deployment status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.result }},
              state: "success",
              environment_url: "${{ steps.wait.outputs.url }}",
              description: "Preview environment is ready"
            });

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.pull_request.number }},
              body: `## 🚀 Preview Environment Ready\n\n**URL:** ${{ steps.wait.outputs.url }}\n\n> Géré par [Cellenza Operator](https://github.com/ihsenalaya/cellenza-operator)`
            });
