name: Preview Environment

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    name: Build & Deploy Preview
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      deployments: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:pr-${{ github.event.pull_request.number }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Create GitHub Deployment
        id: deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.pull_request.head.sha,
              environment: `pr-${{ github.event.pull_request.number }}`,
              auto_merge: false,
              required_contexts: [],
              description: "Cellenza preview environment"
            });
            return deployment.data.id;

      - name: Apply Cellenza manifest
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
        run: |
          echo "$KUBECONFIG_DATA" | base64 -d > /tmp/kubeconfig
          export KUBECONFIG=/tmp/kubeconfig

          kubectl apply -f - <<EOF
          apiVersion: platform.company.io/v1alpha1
          kind: Cellenza
          metadata:
            name: pr-${{ github.event.pull_request.number }}
          spec:
            branch: ${{ github.head_ref }}
            prNumber: ${{ github.event.pull_request.number }}
            image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            resourceTier: medium
            ttl: 48h
          EOF

      - name: Wait for environment to be Running
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG }}
        run: |
          echo "$KUBECONFIG_DATA" | base64 -d > /tmp/kubeconfig
          export KUBECONFIG=/tmp/kubeconfig

          for i in $(seq 1 30); do
            PHASE=$(kubectl get cellenza pr-${{ github.event.pull_request.number }} \
              -o jsonpath='{.status.phase}' 2>/dev/null)
            URL=$(kubectl get cellenza pr-${{ github.event.pull_request.number }} \
              -o jsonpath='{.status.url}' 2>/dev/null)
            echo "Phase: $PHASE — URL: $URL"
            if [ "$PHASE" = "Running" ]; then
              echo "PREVIEW_URL=$URL" >> $GITHUB_ENV
              break
            fi
            sleep 10
          done

      - name: Update GitHub Deployment status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.result }},
              state: "success",
              environment_url: process.env.PREVIEW_URL,
              description: "Preview environment is ready"
            });

      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const url = process.env.PREVIEW_URL;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.pull_request.number }},
              body: `## 🚀 Preview Environment Ready\n\n**URL:** ${url}\n\n> Géré par [Cellenza Operator](https://github.com/ihsenalaya/cellenza-operator)`
            });
