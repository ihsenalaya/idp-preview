name: Cleanup Preview Environment

on:
  pull_request:
    types: [closed]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GITHUB_TOKEN_SECRET: github-token-pr-${{ github.event.pull_request.number }}

jobs:
  cleanup:
    name: Delete Preview
    runs-on: [self-hosted, test1]
    permissions:
      contents: read
      deployments: write
      pull-requests: write

    steps:
      - name: Install kubectl
        run: |
          if ! command -v kubectl >/dev/null 2>&1; then
            curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            chmod +x kubectl
            mkdir -p "$HOME/.local/bin"
            mv kubectl "$HOME/.local/bin/"
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi

      - name: Refresh controller GitHub token secret
        run: |
          kubectl create secret generic "$GITHUB_TOKEN_SECRET" \
            --namespace=preview-operator-system \
            --from-literal=token='${{ secrets.GITHUB_TOKEN }}' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Delete Preview
        run: |
          kubectl delete preview pr-${{ github.event.pull_request.number }} \
            --ignore-not-found

          for i in $(seq 1 30); do
            if ! kubectl get preview pr-${{ github.event.pull_request.number }} >/dev/null 2>&1; then
              echo "Preview deleted"
              exit 0
            fi
            sleep 5
          done

          kubectl describe preview pr-${{ github.event.pull_request.number }} || true
          exit 1

      - name: Comment PR — environment deleted
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body "Preview environment **pr-${{ github.event.pull_request.number }}** supprimé."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup controller GitHub token secret
        if: always()
        run: |
          kubectl delete secret "$GITHUB_TOKEN_SECRET" \
            --namespace=preview-operator-system --ignore-not-found
