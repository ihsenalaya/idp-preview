name: Cleanup Preview Environment

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR / preview number to delete (e.g. 9999 for a demo run)
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
  GITHUB_TOKEN_SECRET: github-token-pr-${{ github.event.pull_request.number || github.event.inputs.pr_number }}

jobs:
  cleanup:
    name: Delete Preview
    runs-on: [self-hosted, aks]
    permissions:
      contents: read
      deployments: write
      pull-requests: write

    steps:
      - name: Install kubectl
        run: |
          if ! command -v kubectl >/dev/null 2>&1; then
            curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            chmod +x kubectl
            mkdir -p "$HOME/.local/bin"
            mv kubectl "$HOME/.local/bin/"
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi

      - name: Refresh controller GitHub token secret
        run: |
          kubectl create secret generic "$GITHUB_TOKEN_SECRET" \
            --namespace=preview-operator-system \
            --from-literal=token='${{ secrets.GITHUB_TOKEN }}' \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Delete Preview
        run: |
          kubectl delete preview pr-${{ env.PR_NUMBER }} \
            --ignore-not-found

          for i in $(seq 1 30); do
            if ! kubectl get preview pr-${{ env.PR_NUMBER }} >/dev/null 2>&1; then
              echo "Preview deleted"
              exit 0
            fi
            sleep 5
          done

          kubectl describe preview pr-${{ env.PR_NUMBER }} || true
          exit 1

      - name: Comment PR — environment deleted
        if: github.event_name == 'pull_request'
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body "Preview environment **pr-${{ env.PR_NUMBER }}** supprimé."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup controller GitHub token secret
        if: always()
        run: |
          kubectl delete secret "$GITHUB_TOKEN_SECRET" \
            --namespace=preview-operator-system --ignore-not-found
