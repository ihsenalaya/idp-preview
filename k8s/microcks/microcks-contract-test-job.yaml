---
# Microcks contract test job — runs OPEN_API_SCHEMA validation against the
# live backend in a preview namespace.
#
# Usage (applied by the operator or manually):
#   kubectl apply -f k8s/microcks/microcks-contract-test-job.yaml -n preview-pr-<N>
#
# Required secrets in the preview namespace:
#   microcks-credentials  →  MICROCKS_CLIENT_ID, MICROCKS_CLIENT_SECRET
#
# Required ConfigMap in the preview namespace:
#   microcks-config       →  MICROCKS_URL, API_NAME, API_VERSION, TEST_RUNNER
#
# All values below use defaults suitable for the demo; override via the env
# section or by patching the Job before applying.
apiVersion: batch/v1
kind: Job
metadata:
  name: microcks-contract-tests
  # namespace is set by the operator to preview-pr-<N>
  labels:
    app.kubernetes.io/part-of: preview-platform
    app.kubernetes.io/component: contract-test
    preview.platform.io/suite: microcks
  annotations:
    preview.platform.io/openapi-spec: "api/openapi.yaml"
    preview.platform.io/api-name: "Preview Catalog API"
    preview.platform.io/api-version: "1.0.0"
spec:
  # Keep completed/failed pods for log inspection; operator cleans up on teardown
  ttlSecondsAfterFinished: 600
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: preview-platform
        app.kubernetes.io/component: contract-test
    spec:
      restartPolicy: Never
      serviceAccountName: default

      # Init container: wait for the backend to be ready before running tests
      initContainers:
        - name: wait-for-backend
          image: curlimages/curl:8.7.1
          command:
            - sh
            - -c
            - |
              echo "[init] Waiting for backend at ${BACKEND_URL}/healthz …"
              for i in $(seq 1 30); do
                if curl -sf "${BACKEND_URL}/healthz" > /dev/null 2>&1; then
                  echo "[init] Backend ready."
                  exit 0
                fi
                echo "[init] Attempt ${i}/30 — retrying in 5s"
                sleep 5
              done
              echo "[init] Backend did not become ready in time." >&2
              exit 1
          env:
            - name: BACKEND_URL
              value: "http://svc-backend:8080"

      containers:
        - name: microcks-test
          image: python:3.11-slim
          command:
            - sh
            - -c
            - |
              set -eu
              pip install --quiet requests
              python /scripts/run-microcks-contract-test.py
          env:
            # Microcks server — override for your installation
            - name: MICROCKS_URL
              value: "http://microcks.microcks.svc.cluster.local:8080"

            # OAuth2 client credentials — loaded from Secret
            - name: MICROCKS_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: microcks-credentials
                  key: client_id
                  optional: true   # optional: test skips auth when absent (open Microcks)
            - name: MICROCKS_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: microcks-credentials
                  key: client_secret
                  optional: true

            # Backend target inside the preview namespace
            - name: BACKEND_URL
              value: "http://svc-backend:8080"

            # Microcks API descriptor — must match what is imported in Microcks
            - name: API_NAME
              value: "Preview Catalog API"
            - name: API_VERSION
              value: "1.0.0"
            - name: TEST_RUNNER
              value: "OPEN_API_SCHEMA"

            # Timeout for a single Microcks test run (milliseconds)
            - name: TEST_TIMEOUT_MS
              value: "30000"

          volumeMounts:
            - name: test-script
              mountPath: /scripts

          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi

      volumes:
        - name: test-script
          configMap:
            name: microcks-test-script
            defaultMode: 0755
