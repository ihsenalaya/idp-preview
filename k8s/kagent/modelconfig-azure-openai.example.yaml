---
# ModelConfig for kagent — Azure OpenAI example.
#
# USAGE
#   1. Copy this file, remove the .example suffix.
#   2. Fill in your Azure endpoint and model deployment name.
#   3. Create the api-key Secret:
#        kubectl create secret generic azure-openai-credentials \
#          --namespace kagent-system \
#          --from-literal=api-key=<YOUR_AZURE_OPENAI_API_KEY>
#   4. kubectl apply -f k8s/kagent/modelconfig-azure-openai.yaml
#
# Alternative providers
#   - OpenAI:   set provider to OpenAI, remove azureDeployment
#   - Ollama:   set provider to Ollama, point baseUrl to in-cluster Ollama service
#
# Reference: https://kagent.dev/docs/configuration/model-config
apiVersion: kagent.dev/v1alpha1
kind: ModelConfig
metadata:
  name: azure-openai-gpt4o
  namespace: kagent-system
  labels:
    app.kubernetes.io/part-of: preview-platform
    app.kubernetes.io/component: kagent
spec:
  provider: AzureOpenAI

  # Azure-specific fields
  azure:
    # Your Azure OpenAI endpoint — e.g. https://my-resource.openai.azure.com
    endpoint: "https://<YOUR_RESOURCE_NAME>.openai.azure.com"
    # The deployment name you created in Azure AI Studio
    deploymentName: "gpt-4o"
    # API version — use the latest stable release
    apiVersion: "2024-10-21"

  # Model identifier (informational — used in logs and PR comments)
  model: gpt-4o

  # API key loaded from a Kubernetes Secret — never hardcode credentials
  apiKeySecretRef:
    name: azure-openai-credentials
    namespace: kagent-system
    key: api-key

  # Generation parameters
  parameters:
    temperature: 0.1       # low temperature for deterministic diagnosis
    maxTokens: 4096
