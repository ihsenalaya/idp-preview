# Serveur MCP GitHub pour kagent — expose les outils de diff/commentaires de PR.
# Requis par l'agent preview-diff-analyzer (RemoteMCPServer github-mcp-server).
#
# Dependances (fournies par External Secrets) :
#   - secret preview-github-token (cle `token`) : PAT GitHub
#   - secret ghcr-pull-secret : pull de l'image privee
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: github-mcp-server
  namespace: kagent-system
  labels:
    app: github-mcp-server
    app.kubernetes.io/component: kagent
    app.kubernetes.io/part-of: preview-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: github-mcp-server
  template:
    metadata:
      labels:
        app: github-mcp-server
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: github-mcp-server
          image: ghcr.io/ihsenalaya/github-mcp-server:latest
          # IfNotPresent: on kind the image is built from source and `kind load`ed
          # (automatisation/local-kind/scripts/build-mcp-images.sh, run by up.sh),
          # so no GHCR pull is attempted. On AKS the image is absent locally and is
          # pulled via imagePullSecrets. Works for both — and lets the repo be public
          # without exposing the private MCP images.
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8812
              protocol: TCP
          env:
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: preview-github-token
                  key: token
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: github-mcp-server
  namespace: kagent-system
  labels:
    app: github-mcp-server
    app.kubernetes.io/component: kagent
    app.kubernetes.io/part-of: preview-platform
spec:
  type: ClusterIP
  selector:
    app: github-mcp-server
  ports:
    - port: 8812
      targetPort: 8812
      protocol: TCP
---
apiVersion: kagent.dev/v1alpha2
kind: RemoteMCPServer
metadata:
  name: github-mcp-server
  namespace: kagent-system
  labels:
    app.kubernetes.io/component: kagent
    app.kubernetes.io/part-of: preview-platform
spec:
  description: GitHub MCP server - exposes PR diff and comment tools for kagent diff analysis.
  protocol: SSE
  url: http://github-mcp-server.kagent-system.svc.cluster.local:8812/sse
  timeout: 30s
  terminateOnClose: true
