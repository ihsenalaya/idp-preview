---
# RemoteMCPServer — Kubernetes read-only MCP server for kagent.
#
# USAGE
#   This example assumes you deploy the official kagent Kubernetes MCP server
#   (https://github.com/kagent-dev/kagent/tree/main/tools/kubernetes-mcp-server)
#   as a Deployment in kagent-system.
#
#   After deploying the MCP server:
#     kubectl apply -f k8s/kagent/remote-mcp-server.yaml
#
# The agent uses this server to call Kubernetes read operations:
#   - get/list pods, jobs, events, logs
#   - get Preview CR status
#   - get Microcks job logs
#
# IMPORTANT: the MCP server must run with the kagent-troubleshooter ServiceAccount
# (or an equivalent read-only ServiceAccount) so that it cannot mutate resources.
#
# Reference: https://kagent.dev/docs/tools/remote-mcp-server
apiVersion: kagent.dev/v1alpha1
kind: RemoteMCPServer
metadata:
  name: kubernetes-readonly-mcp
  namespace: kagent-system
  labels:
    app.kubernetes.io/part-of: preview-platform
    app.kubernetes.io/component: kagent
spec:
  # URL of the in-cluster MCP server (SSE or HTTP transport)
  # Replace with the actual Service ClusterIP or DNS name after deployment
  url: "http://kubernetes-mcp-server.kagent-system.svc.cluster.local:8811/sse"

  # SSE (Server-Sent Events) transport — default for kagent MCP servers
  transport: SSE

  # Optional: restrict which tool names the agent may call.
  # Omit to allow all tools exposed by the server.
  # Uncomment and extend to enforce a tighter allowlist:
  # toolFilter:
  #   allowed:
  #     - get_pod
  #     - list_pods
  #     - get_pod_logs
  #     - list_jobs
  #     - get_job
  #     - list_events
  #     - get_resource
  #     - list_resources
