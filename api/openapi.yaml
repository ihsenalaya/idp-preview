openapi: 3.0.3
info:
  title: Preview Catalog API
  version: 1.0.0
  description: 'REST API for the Preview Platform demo application.

    Exposes a product catalogue with categories, reviews, orders and statistics.

    Used by Microcks for contract validation in every preview environment.

    '
  contact:
    name: ihsenalaya
    url: https://github.com/ihsenalaya/idp-preview
servers:
- url: http://svc-backend:8080
  description: In-cluster backend (preview namespace)
- url: http://localhost:8080
  description: Local development
paths:
  /healthz:
    get:
      operationId: healthCheck
      summary: Liveness probe
      tags:
      - Health
      responses:
        '200':
          description: Service is alive
          content:
            text/plain:
              schema:
                type: string
                enum:
                - ok
              examples:
                Example_1:
                  value: ok
  /api/categories:
    get:
      operationId: listCategories
      summary: List all categories with product count
      tags:
      - Categories
      responses:
        '200':
          description: Array of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'
              examples:
                Example_1:
                  value:
                  - id: 1
                    name: Electronics
                    slug: electronics
                    product_count: 5
                  - id: 2
                    name: Clothing
                    slug: clothing
                    product_count: 3
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      operationId: createCategory
      summary: Create a new category
      tags:
      - Categories
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryCreate'
            examples:
              Example_1:
                value:
                  name: Electronics
                  slug: electronics
      responses:
        '201':
          description: Category created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryCreated'
              examples:
                Example_1:
                  value:
                    id: 1
                    name: Electronics
                    slug: electronics
        '400':
          description: Validation error — name and slug are required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: name and slug are required
        '500':
          $ref: '#/components/responses/InternalError'
  /api/products:
    get:
      operationId: listProducts
      summary: List products (last 50, with average rating)
      tags:
      - Products
      responses:
        '200':
          description: Array of products with ratings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
              examples:
                Example_1:
                  value:
                  - id: 1
                    name: Wireless Headphones
                    description: Premium noise-cancelling headphones
                    price: 199.99
                    stock: 12
                    discount_pct: 10.0
                    created_at: '2026-05-01T10:00:00+00:00'
                    category_name: Electronics
                    avg_rating: 4.5
                    review_count: 6
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      operationId: createProduct
      summary: Create a new product
      tags:
      - Products
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCreate'
            examples:
              Example_1:
                value:
                  name: Wireless Headphones
                  description: Premium noise-cancelling headphones
                  category_id: 1
                  price: 199.99
                  stock: 12
                  discount_pct: 10.0
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductCreated'
              examples:
                Example_1:
                  value:
                    id: 1
                    name: Wireless Headphones
                    price: 199.99
                    stock: 12
                    discount_pct: 10.0
                    created_at: '2026-05-01T10:00:00+00:00'
        '400':
          description: Validation error — name and price are required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: name and price are required
        '500':
          $ref: '#/components/responses/InternalError'
  /api/products/discounted:
    get:
      operationId: listDiscountedProducts
      summary: List products with a discount above the given threshold
      tags:
      - Products
      parameters:
      - name: min_discount
        in: query
        required: false
        schema:
          type: number
          format: float
          minimum: 0
          maximum: 100
          default: 0
        description: Minimum discount percentage (0–100)
        example: 10
      responses:
        '200':
          description: Discounted products with effective price
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscountedProductList'
              examples:
                Example_1:
                  value:
                    count: 2
                    products:
                    - id: 1
                      name: Wireless Headphones
                      description: Premium noise-cancelling headphones
                      price: 199.99
                      stock: 12
                      discount_pct: 10.0
                      discounted_price: 179.99
                      category_name: Electronics
        '500':
          $ref: '#/components/responses/InternalError'
  /api/products/top-rated:
    get:
      operationId: listTopRatedProducts
      summary: List products ranked by average review rating
      tags:
      - Products
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 50
          default: 10
        description: Maximum number of results (default 10, max 50)
        example: 5
      responses:
        '200':
          description: Products ranked by average rating, descending
          content:
            application/json:
              schema:
                type: object
                required: [count, results]
                properties:
                  count:
                    type: integer
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/TopRatedProduct'
              examples:
                Example_1:
                  value:
                    count: 2
                    results:
                    - id: 3
                      name: Wireless Headphones
                      price: 199.99
                      category: Electronics
                      avg_rating: 4.8
                      review_count: 5
                    - id: 7
                      name: Leather Notebook
                      price: 24.99
                      category: Stationery
                      avg_rating: 4.5
                      review_count: 3
        '500':
          $ref: '#/components/responses/InternalError'
  /api/products/{id}:
    get:
      operationId: getProduct
      summary: Get a product by ID with its reviews
      tags:
      - Products
      parameters:
      - $ref: '#/components/parameters/ProductId'
      responses:
        '200':
          description: Product with reviews
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDetail'
              examples:
                Example_1:
                  value:
                    id: 1
                    name: Wireless Headphones
                    description: Premium noise-cancelling headphones
                    price: 199.99
                    stock: 12
                    discount_pct: 10.0
                    created_at: '2026-05-01T10:00:00+00:00'
                    category_name: Electronics
                    reviews:
                    - id: 1
                      author: alice
                      rating: 5
                      comment: Excellent product
                      created_at: '2026-05-02T08:00:00+00:00'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      operationId: deleteProduct
      summary: Delete a product
      tags:
      - Products
      parameters:
      - $ref: '#/components/parameters/ProductId'
      responses:
        '204':
          description: Product deleted (no body)
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/products/{id}/reviews:
    get:
      operationId: listProductReviews
      summary: List reviews for a product
      tags:
      - Reviews
      parameters:
      - $ref: '#/components/parameters/ProductId'
      responses:
        '200':
          description: Array of reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Review'
              examples:
                Example_1:
                  value:
                  - id: 1
                    author: alice
                    rating: 5
                    comment: Excellent product
                    created_at: '2026-05-02T08:00:00+00:00'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      operationId: createProductReview
      summary: Submit a review for a product
      tags:
      - Reviews
      parameters:
      - $ref: '#/components/parameters/ProductId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewCreate'
            examples:
              Example_1:
                value:
                  author: alice
                  rating: 5
                  comment: Excellent product
      responses:
        '201':
          description: Review created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'
              examples:
                Example_1:
                  value:
                    id: 1
                    author: alice
                    rating: 5
                    comment: Excellent product
                    created_at: '2026-05-02T08:00:00+00:00'
        '400':
          description: Validation error — rating must be between 1 and 5
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: rating must be between 1 and 5
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/orders:
    post:
      operationId: createOrder
      summary: Place an order for a product
      tags:
      - Orders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCreate'
            examples:
              Example_1:
                value:
                  product_id: 1
                  quantity: 2
      responses:
        '201':
          description: Order placed — stock is decremented atomically
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
              examples:
                Example_1:
                  value:
                    id: 1
                    product_id: 1
                    quantity: 2
                    status: pending
                    created_at: '2026-05-01T11:00:00+00:00'
        '400':
          description: Validation error — product_id and quantity >= 1 are required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: product_id and quantity >= 1 are required
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: product not found
        '409':
          description: Insufficient stock
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: insufficient stock
        '500':
          $ref: '#/components/responses/InternalError'
    get:
      operationId: listOrders
      summary: List the last 50 orders
      tags:
      - Orders
      responses:
        '200':
          description: Array of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'
              examples:
                Example_1:
                  value:
                  - id: 1
                    product_id: 1
                    product_name: Wireless Headphones
                    quantity: 2
                    status: pending
                    created_at: '2026-05-01T11:00:00+00:00'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/stats:
    get:
      operationId: getStats
      summary: Aggregated platform statistics
      tags:
      - Stats
      responses:
        '200':
          description: Platform statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Stats'
              examples:
                Example_1:
                  value:
                    total_products: 10
                    total_categories: 3
                    total_reviews: 20
                    total_orders: 5
                    out_of_stock: 1
                    low_stock: 2
                    avg_rating: 4.2
                    categories:
                    - Electronics
                    - Clothing
                    - Books
        '500':
          $ref: '#/components/responses/InternalError'
components:
  parameters:
    ProductId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
      description: Product identifier
      example: 1
  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: not found
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: connection refused
  schemas:
    Promotion:
      type: object
      properties:
        id:
          type: integer
        label:
          type: string
        discount_pct:
          type: number
        starts_at:
          type: string
          format: date-time
        ends_at:
          type: string
          format: date-time
        product_id:
          type: integer
        product_name:
          type: string
    PromotionInput:
      type: object
      required: [product_id, label, discount_pct, starts_at, ends_at]
      properties:
        product_id:
          type: integer
        label:
          type: string
        discount_pct:
          type: number
        starts_at:
          type: string
          format: date-time
        ends_at:
          type: string
          format: date-time
    Category:
      type: object
      required:
      - id
      - name
      - slug
      - product_count
      properties:
        id:
          type: integer
          minimum: 1
        name:
          type: string
          minLength: 1
          maxLength: 100
        slug:
          type: string
          minLength: 1
          maxLength: 100
        product_count:
          type: integer
          minimum: 0
    CategoryCreate:
      type: object
      required:
      - name
      - slug
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        slug:
          type: string
          minLength: 1
          maxLength: 100
    CategoryCreated:
      type: object
      required:
      - id
      - name
      - slug
      properties:
        id:
          type: integer
          minimum: 1
        name:
          type: string
        slug:
          type: string
    Product:
      type: object
      required:
      - id
      - name
      - price
      - stock
      - discount_pct
      - created_at
      properties:
        id:
          type: integer
          minimum: 1
        name:
          type: string
          minLength: 1
        description:
          type: string
          nullable: true
        price:
          type: number
          format: float
          minimum: 0
        stock:
          type: integer
          minimum: 0
        discount_pct:
          type: number
          format: float
          minimum: 0
          maximum: 100
        created_at:
          type: string
          format: date-time
        category_name:
          type: string
          nullable: true
        avg_rating:
          type: number
          format: float
          minimum: 1
          maximum: 5
          nullable: true
        review_count:
          type: integer
          minimum: 0
    ProductCreate:
      type: object
      required:
      - name
      - price
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          nullable: true
        category_id:
          type: integer
          minimum: 1
          nullable: true
        price:
          type: number
          format: float
          minimum: 0
        stock:
          type: integer
          minimum: 0
          default: 0
        discount_pct:
          type: number
          format: float
          minimum: 0
          maximum: 100
          default: 0
    ProductCreated:
      type: object
      required:
      - id
      - name
      - price
      - stock
      - discount_pct
      - created_at
      properties:
        id:
          type: integer
          minimum: 1
        name:
          type: string
        price:
          type: number
          format: float
        stock:
          type: integer
        discount_pct:
          type: number
          format: float
        created_at:
          type: string
          format: date-time
    ProductDetail:
      type: object
      required:
      - id
      - name
      - price
      - stock
      - discount_pct
      - created_at
      - reviews
      properties:
        id:
          type: integer
          minimum: 1
        name:
          type: string
        description:
          type: string
          nullable: true
        price:
          type: number
          format: float
        stock:
          type: integer
        discount_pct:
          type: number
          format: float
        created_at:
          type: string
          format: date-time
        category_name:
          type: string
          nullable: true
        reviews:
          type: array
          items:
            $ref: '#/components/schemas/Review'
    DiscountedProductList:
      type: object
      required:
      - count
      - products
      properties:
        count:
          type: integer
          minimum: 0
        products:
          type: array
          items:
            $ref: '#/components/schemas/DiscountedProduct'
    DiscountedProduct:
      type: object
      required:
      - id
      - name
      - price
      - stock
      - discount_pct
      - discounted_price
      properties:
        id:
          type: integer
          minimum: 1
        name:
          type: string
        description:
          type: string
          nullable: true
        price:
          type: number
          format: float
        stock:
          type: integer
          minimum: 1
        discount_pct:
          type: number
          format: float
        discounted_price:
          type: number
          format: float
        category_name:
          type: string
          nullable: true
    TopRatedProduct:
      type: object
      required:
      - id
      - name
      - price
      - avg_rating
      - review_count
      properties:
        id:
          type: integer
          minimum: 1
        name:
          type: string
        price:
          type: number
          format: float
        category:
          type: string
          nullable: true
        avg_rating:
          type: number
          format: float
          minimum: 1
          maximum: 5
        review_count:
          type: integer
          minimum: 1
    Review:
      type: object
      required:
      - id
      - author
      - rating
      - created_at
      properties:
        id:
          type: integer
          minimum: 1
        author:
          type: string
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
    ReviewCreate:
      type: object
      required:
      - rating
      properties:
        author:
          type: string
          maxLength: 50
          default: anonymous
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
          maxLength: 500
          nullable: true
    OrderCreate:
      type: object
      required:
      - product_id
      properties:
        product_id:
          type: integer
          minimum: 1
        quantity:
          type: integer
          minimum: 1
          default: 1
    OrderResponse:
      type: object
      required:
      - id
      - product_id
      - quantity
      - status
      - created_at
      properties:
        id:
          type: integer
          minimum: 1
        product_id:
          type: integer
          minimum: 1
        quantity:
          type: integer
          minimum: 1
        status:
          type: string
          enum:
          - pending
          - confirmed
          - shipped
          - cancelled
        created_at:
          type: string
          format: date-time
    Order:
      type: object
      required:
      - id
      - product_id
      - quantity
      - status
      - created_at
      properties:
        id:
          type: integer
          minimum: 1
        product_id:
          type: integer
          nullable: true
        product_name:
          type: string
          nullable: true
        quantity:
          type: integer
          minimum: 1
        status:
          type: string
        created_at:
          type: string
          format: date-time
    Stats:
      type: object
      required:
      - total_products
      - total_categories
      - total_reviews
      - total_orders
      - out_of_stock
      - low_stock
      - categories
      properties:
        total_products:
          type: integer
          minimum: 0
        total_categories:
          type: integer
          minimum: 0
        total_reviews:
          type: integer
          minimum: 0
        total_orders:
          type: integer
          minimum: 0
        out_of_stock:
          type: integer
          minimum: 0
        low_stock:
          type: integer
          minimum: 0
        avg_rating:
          type: number
          format: float
          minimum: 1
          maximum: 5
          nullable: true
        categories:
          type: array
          items:
            type: string
    ErrorResponse:
      type: object
      required:
      - error
      properties:
        error:
          type: string
          minLength: 1
/api/promotions:
    get:
      summary: List active promotions
      operationId: listPromotions
      tags: [Promotions]
      responses:
        '200':
          description: Active promotions list
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/Promotion'
    post:
      summary: Create a promotion
      operationId: createPromotion
      tags: [Promotions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromotionInput'
      responses:
        '201':
          description: Promotion created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
        '400':
          $ref: '#/components/responses/BadRequest'
tags:
- name: Health
  description: Liveness and readiness probes
- name: Categories
  description: Product category management
- name: Products
  description: Product catalogue
- name: Reviews
  description: Product reviews
- name: Orders
  description: Order placement
- name: Stats
  description: Aggregated platform statistics
- name: Promotions
  description: Time-limited product promotions
