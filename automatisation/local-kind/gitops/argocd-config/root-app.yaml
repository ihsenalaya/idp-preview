# App-of-Apps racine — variante locale kind.
# Deploie toutes les Applications enfants de gitops/apps/.
#
# __GIT_REPO_URL__ / __GIT_REVISION__ sont substitues par 04-bootstrap-argocd.sh
# a partir des valeurs du .env (GIT_REPO_URL / GIT_REVISION).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: idp-preview-local-root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: idp-preview
  source:
    repoURL: __GIT_REPO_URL__
    targetRevision: __GIT_REVISION__
    path: automatisation/local-kind/gitops/apps
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
