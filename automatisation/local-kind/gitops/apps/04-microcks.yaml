# Microcks — mocking & tests de contrat d'API. Wave 0.
#
# Keycloak ACTIVE : les scripts de contrat (/app/tests/microcks-import.py et
# microcks.py) recuperent un token OAuth2 sur
# microcks-keycloak.microcks.svc.cluster.local:8080/realms/microcks (valeur par
# defaut injectee par l'operateur). Sans Keycloak ce service n'existe pas et les
# tests echouent avec "Failed to resolve microcks-keycloak..." (DNS), comme
# observe sur pr-47. UI exposee via ingress-nginx sur microcks.127.0.0.1.nip.io.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: microcks
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: idp-preview
  source:
    repoURL: https://microcks.io/helm
    chart: microcks
    targetRevision: 1.14.0
    helm:
      valuesObject:
        microcks:
          url: microcks.127.0.0.1.nip.io
          ingress:
            enabled: true
            className: nginx
        keycloak:
          enabled: true
        features:
          async:
            enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: microcks
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
