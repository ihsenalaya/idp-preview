# ingress-nginx — point d'entree HTTP des previews. Wave -2.
#
# Valeurs adaptees a kind : le controleur tourne sur le node `ingress-ready`
# (le control-plane, qui mappe les ports 80/443 de l'hote via extraPortMappings)
# et publie en hostPort. Les previews http://pr-<N>.preview.127.0.0.1.nip.io
# arrivent donc directement sur localhost:80 -> ingress-nginx.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: idp-preview
  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: 4.15.1
    helm:
      valuesObject:
        controller:
          hostPort:
            enabled: true
          service:
            type: NodePort
          publishService:
            enabled: false
          watchIngressWithoutClass: true
          nodeSelector:
            ingress-ready: "true"
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Equal
              effect: NoSchedule
          admissionWebhooks:
            enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
