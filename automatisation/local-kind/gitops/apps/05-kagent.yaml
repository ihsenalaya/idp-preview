# kagent — framework d'orchestration des agents IA. Wave 0.
# Chart Helm OCI public (ghcr.io/kagent-dev).
#
# === GitHub Models (gratuit) ===
# Au lieu d'Azure OpenAI (prod), on pointe le provider OpenAI de kagent sur
# l'endpoint OpenAI-compatible des GitHub Models. Le ModelConfig genere par le
# chart s'appelle `default-model-config` (reference par tous les agents).
#
#   provider  : OpenAI (endpoint custom via config.baseUrl)
#   baseUrl   : https://models.github.ai/inference
#   model     : openai/gpt-4o-mini   (prefixe editeur requis sur cet endpoint)
#   cle API   : secret kagent-openai (cle OPENAI_API_KEY) = PAT GitHub scope
#               `models:read`, cree par 03-secrets.sh.
#
# NB rate limits : les GitHub Models gratuits sont fortement limites
# (req/min + tokens/req). Suffisant pour de la demo, pas pour de la charge.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kagent
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: idp-preview
  source:
    repoURL: ghcr.io/kagent-dev/kagent/helm
    chart: kagent
    targetRevision: 0.9.2
    helm:
      valuesObject:
        providers:
          default: openAI
          openAI:
            provider: OpenAI
            model: "openai/gpt-4o-mini"
            apiKeySecretRef: kagent-openai
            apiKeySecretKey: OPENAI_API_KEY
            config:
              baseUrl: "https://models.github.ai/inference"
  destination:
    server: https://kubernetes.default.svc
    namespace: kagent-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
