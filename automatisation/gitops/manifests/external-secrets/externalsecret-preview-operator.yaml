# Secrets du namespace preview-operator-system, generes depuis Key Vault.
#   preview-github-token     <- KV/github-pat        (PR comments, deployments)
#   ai-api-key               <- KV/azure-openai-key  (AI enrichment)
#   azure-openai-credentials <- KV/azure-openai-key  (AI enrichment)
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: preview-github-token
  namespace: preview-operator-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault
    kind: ClusterSecretStore
  target:
    name: preview-github-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: github-pat
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ai-api-key
  namespace: preview-operator-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault
    kind: ClusterSecretStore
  target:
    name: ai-api-key
    creationPolicy: Owner
  data:
    - secretKey: api-key
      remoteRef:
        key: azure-openai-key
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: azure-openai-credentials
  namespace: preview-operator-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault
    kind: ClusterSecretStore
  target:
    name: azure-openai-credentials
    creationPolicy: Owner
  data:
    - secretKey: api-key
      remoteRef:
        key: azure-openai-key
