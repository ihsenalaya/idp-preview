# ClusterSecretStore : pointe sur Azure Key Vault `idp-preview-kv`.
# Authentification via Workload Identity — le ServiceAccount `external-secrets`
# (controleur ESO) est federe avec la managed identity `idp-eso-identity`,
# qui a le role "Key Vault Secrets User" sur le vault.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: azure-keyvault
spec:
  provider:
    azurekv:
      authType: WorkloadIdentity
      vaultUrl: https://idp-preview-kv.vault.azure.net
      serviceAccountRef:
        name: external-secrets
        namespace: external-secrets
