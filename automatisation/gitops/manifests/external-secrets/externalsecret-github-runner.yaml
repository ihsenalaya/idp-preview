# Secret du namespace github-runner, genere depuis Key Vault.
#   runner-token <- KV/github-pat  (PAT long-lived ; le runner echange ce PAT
#                                   contre un token d'enregistrement a chaque
#                                   demarrage de pod)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: runner-token
  namespace: github-runner
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault
    kind: ClusterSecretStore
  target:
    name: runner-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: github-pat
