# Secrets du namespace kagent-system, generes depuis Key Vault.
#   preview-github-token  <- KV/github-pat        (agent preview-diff-analyzer)
#   kagent-openai         <- KV/azure-openai-key  (ModelConfig AzureOpenAI)
#   ghcr-pull-secret      <- KV/github-pat        (pull image privee jaeger-mcp-server)
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: preview-github-token
  namespace: kagent-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault
    kind: ClusterSecretStore
  target:
    name: preview-github-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: github-pat
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kagent-openai
  namespace: kagent-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault
    kind: ClusterSecretStore
  target:
    name: kagent-openai
    creationPolicy: Owner
  data:
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: azure-openai-key
---
# Secret de pull GHCR : un dockerconfigjson est genere via template a partir
# du PAT GitHub (qui doit porter le scope read:packages).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghcr-pull-secret
  namespace: kagent-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault
    kind: ClusterSecretStore
  target:
    name: ghcr-pull-secret
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"ghcr.io":{"username":"ihsenalaya","password":"{{ .pat }}","auth":"{{ printf "ihsenalaya:%s" .pat | b64enc }}"}}}
  data:
    - secretKey: pat
      remoteRef:
        key: github-pat
