# Credential de depot ArgoCD pour le chart Helm OCI prive
# ghcr.io/ihsenalaya/charts (chart preview-operator).
#
# ESO genere ce secret dans le namespace argocd avec le label
# `argocd.argoproj.io/secret-type: repository` pour qu'ArgoCD le reconnaisse.
# Le mot de passe est le PAT GitHub (scope read:packages) tire de Key Vault.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: repo-ihsenalaya-charts
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-keyvault
    kind: ClusterSecretStore
  target:
    name: repo-ihsenalaya-charts
    creationPolicy: Owner
    template:
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repository
      data:
        name: ihsenalaya-charts
        type: helm
        url: ghcr.io/ihsenalaya/charts
        enableOCI: "true"
        username: ihsenalaya
        password: "{{ .pat }}"
  data:
    - secretKey: pat
      remoteRef:
        key: github-pat
