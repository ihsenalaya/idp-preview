# kagent CRDs — doivent etre installes avant le chart kagent. Wave -2.
# Chart Helm OCI public (ghcr.io/kagent-dev).
#
# Replace=true : les CRDs agents/sandboxagents (~400-500 Ko) depassent la
# limite d'annotation de l'apply client-side. `kubectl replace` n'ecrit pas
# l'annotation last-applied-configuration. Sans risque : cette Application ne
# contient que des CRDs.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kagent-crds
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: idp-preview
  source:
    repoURL: ghcr.io/kagent-dev/kagent/helm
    chart: kagent-crds
    targetRevision: 0.9.2
  destination:
    server: https://kubernetes.default.svc
    namespace: kagent-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - Replace=true
