# Configuration External Secrets : ClusterSecretStore (Azure Key Vault) +
# ExternalSecrets qui materialisent les secrets dans les namespaces consommateurs.
# Wave -1 : apres l'operateur ESO (wave -2), avant les workloads (wave >= 1).
#
# Inclut les Namespaces des consommateurs pour qu'ils existent au moment ou
# les ExternalSecrets sont appliques.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: idp-preview
  source:
    repoURL: https://github.com/ihsenalaya/idp-preview
    targetRevision: feat/argocd-gitops
    path: automatisation/gitops/manifests/external-secrets
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
