# External Secrets Operator — synchronise les secrets depuis Azure Key Vault.
# Wave -2 (foundation) : doit tourner avant l'app external-secrets-config.
#
# Authentification : Azure Workload Identity. Le ServiceAccount du controleur
# (`external-secrets`) porte l'annotation client-id de la managed identity
# `idp-eso-identity` ; un federated credential autorise ce SA a obtenir des
# tokens AAD sans aucun secret. Voir gitops/SECRETS.md.
#
# installCRDs=false : les CRDs ESO (~335 Ko) depassent la limite d'annotation
# de l'apply client-side. Elles sont pre-installees en server-side par
# bootstrap.sh ; cette Application ne gere que l'operateur.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: idp-preview
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: 2.5.0
    helm:
      # Le nom de release doit rester `external-secrets` pour que le
      # ServiceAccount du controleur s'appelle exactement `external-secrets`
      # (cible du federated credential Azure).
      releaseName: external-secrets
      valuesObject:
        installCRDs: false
        serviceAccount:
          annotations:
            azure.workload.identity/client-id: "e2899dce-c5d9-4fff-82af-7b2f4984129b"
        podLabels:
          azure.workload.identity/use: "true"
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
