# Istio base — CRDs Istio + ClusterRoles. Wave -2 (foundation).
#
# NOTE D'ADOPTION : sur ce cluster Istio a ete installe via `istioctl`.
# Les charts Helm produisent des labels/annotations differents de istioctl.
# Synchroniser ces 3 Applications istio-* uniquement apres revue du diff
# dans l'UI ArgoCD. Voir gitops/README.md section "Istio".
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-base
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: idp-preview
  source:
    repoURL: https://istio-release.storage.googleapis.com/charts
    chart: base
    targetRevision: 1.23.0
    helm:
      valuesObject:
        defaultRevision: default
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
