# kagent — framework d'orchestration des agents IA. Wave 0.
# Chart Helm OCI public (ghcr.io/kagent-dev).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kagent
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: idp-preview
  source:
    repoURL: ghcr.io/kagent-dev/kagent/helm
    chart: kagent
    targetRevision: 0.9.2
  destination:
    server: https://kubernetes.default.svc
    namespace: kagent-system
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
