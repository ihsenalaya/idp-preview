# Gateway Istio partage `preview-gateway` — route *.preview.ihsenalaya.xyz
# vers l'ingress gateway. Wave 2 : depend des CRDs Istio et de l'ingressgateway.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-preview-gateway
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: idp-preview
  source:
    repoURL: https://github.com/ihsenalaya/idp-preview
    targetRevision: main
    path: automatisation/gitops/manifests/istio
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
